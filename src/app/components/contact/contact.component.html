<section id="contact" appScrollReveal class="py-32 bg-white dark:bg-slate-950 transition-colors duration-500">
  <div class="container mx-auto px-6">
    <div class="max-w-6xl mx-auto rounded-[3.5rem] bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-12 md:p-24 text-center relative overflow-hidden shadow-sm dark:shadow-none">
      
      <!-- Ambient Background -->
      <div class="absolute -top-24 -left-24 w-[400px] h-[400px] bg-blue-600/5 dark:bg-blue-600/10 rounded-full blur-[100px]"></div>
      <div class="absolute -bottom-24 -right-24 w-[400px] h-[400px] bg-emerald-600/5 dark:bg-emerald-600/10 rounded-full blur-[100px]"></div>

      <div class="relative z-10 space-y-12">
        <div class="space-y-4">
          <h2 class="text-sm font-black tracking-[0.3em] uppercase text-blue-600 dark:text-blue-500">Contact</h2>
          <h3 class="text-4xl md:text-7xl font-black text-slate-900 dark:text-white tracking-tighter leading-tight">
            Vous avez un <span class="text-slate-400 dark:text-slate-600 italic transition-colors">projet ?</span>
          </h3>
          <p class="text-slate-600 dark:text-slate-400 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed">
            Discutons de votre application web, plateforme sécurisée ou projet d’automatisation.
          </p>
        </div>

        <!-- Quick Copy Action -->
        <div class="flex flex-col items-center gap-4">
          <button 
            (click)="copyEmail()"
            class="group flex items-center gap-3 px-4 py-2 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-blue-500/50 transition-all shadow-sm dark:shadow-none"
          >
            <svg *ngIf="copied()" lucideCheck [size]="18" class="text-emerald-500"></svg>
            <svg *ngIf="!copied()" lucideCopy [size]="18" class="text-slate-400 group-hover:text-blue-600 dark:group-hover:text-white"></svg>
            <span class="text-sm font-black text-slate-900 dark:text-white uppercase tracking-widest">Copier</span>
          </button>
        </div>

        <!-- Social Channels -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 pt-12">
          @for (channel of channels(); track channel.name) {
            <a 
              [href]="channel.link"
              target="_blank"
              [class]="'group p-8 rounded-[2rem] bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex flex-col items-center gap-4 transition-all duration-500 shadow-sm dark:shadow-none ' + channel.color"
            >
              <ng-container *ngComponentOutlet="channel.icon; inputs: { size: 28 }"></ng-container>
              <span class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 dark:text-slate-500 group-hover:text-inherit transition-colors">
                {{ channel.name }}
              </span>
            </a>
          }
        </div>

        <p class="text-slate-400 dark:text-slate-600 text-xs font-bold uppercase tracking-widest pt-12">Réponse sous 24h garantie.</p>
      </div>
    </div>
  </div>
</section>
