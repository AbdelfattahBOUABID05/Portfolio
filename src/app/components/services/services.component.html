<section id="services" appScrollReveal class="py-32 bg-slate-50 dark:bg-slate-950 transition-colors duration-500">
  <div class="container mx-auto px-6">
    <div class="max-w-4xl mb-20">
      <h2 class="text-sm font-black tracking-[0.3em] uppercase text-indigo-600 dark:text-indigo-500 mb-3">{{ 'services.subtitle' | translate }}</h2>
      <h3 class="text-4xl md:text-5xl lg:text-6xl font-black text-slate-900 dark:text-white leading-tight tracking-tight">
        {{ 'services.title' | translate }}
      </h3>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      @for (service of services(); track service.index) {
        <div [class]="getCardClasses(service.color)">
          <div [class]="getIconClasses(service.color)">
            <span class="flex items-center justify-center">
              <ng-container *ngComponentOutlet="service.icon; inputs: { size: 32 }"></ng-container>
            </span>
          </div>
          <h4 class="text-2xl font-bold mb-4 text-slate-900 dark:text-white">
            {{ service.titleKey | translate }}
          </h4>
          <p class="text-slate-600 dark:text-slate-400 leading-relaxed text-sm">
            {{ service.descriptionKey | translate }}
          </p>
          
          <div class="mt-10 flex items-center gap-3 text-xs font-black uppercase tracking-widest text-slate-400 dark:text-slate-500">
            {{ 'services.learnMore' | translate }}
            <div class="h-px w-8 bg-slate-200 dark:bg-slate-800"></div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
