<nav class="fixed top-0 left-0 right-0 z-50 bg-white/70 dark:bg-slate-950/70 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 transition-all duration-300">
  <div class="container mx-auto px-6 h-20 flex items-center justify-between">
    <!-- Logo -->
    <a (click)="scrollToSection('#hero')" class="cursor-pointer group">
      <img src="assets/logo.png" alt="Logo" class="navbar-logo"> 
    </a>

    <!-- Desktop Menu -->
    <div class="hidden lg:flex items-center gap-8">
      @for (link of navLinks; track link.labelKey) {
        <a (click)="scrollToSection(link.href)" 
           [class.active]="activeSection() === link.href.replace('#', '')"
           class="cursor-pointer text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-white transition-colors">
          {{ link.labelKey | translate }}
        </a>
      }
    </div>

    <!-- Right Side Actions -->
    <div class="hidden lg:flex items-center gap-4">
      <!-- Language Switcher -->
      <button 
        (click)="languageService.switchLanguage()"
        class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition-all duration-300 font-bold"
        [title]="languageService.getCurrentLanguage() === 'en' ? 'Français' : 'English'"
      >
        {{ languageService.getCurrentLanguage().toUpperCase() }}
      </button>

      <!-- Theme Toggle -->
      <button 
        (click)="themeService.toggleTheme()"
        class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition-all duration-300"
        [title]="(themeService.isDarkMode() ? 'theme.light' : 'theme.dark') | translate"
      >
        @if (themeService.isDarkMode()) {
          <svg lucideMoon [size]="20"></svg>
        } @else {
          <svg lucideSun [size]="20"></svg>
        }
      </button>

      <a href="assets/data/BouabidAbdelfattah_CV.pdf" download="Bouabid_Abdelfattah_CV.pdf" class="relative group overflow-hidden px-6 py-2.5 rounded-xl bg-gradient-to-r from-blue-600 to-emerald-500 text-white font-bold text-sm transition-all duration-300 hover:shadow-[0_0_20px_rgba(59,130,246,0.4)]">
        <span class="relative z-10 flex items-center gap-2">
          <span class="flex items-center justify-center">
            <svg lucideDownload [size]="16"></svg>
          </span>
          {{ 'navbar.downloadCV' | translate }}
        </span>
      </a>
    </div>

    <!-- Mobile Menu Button -->
    <div class="flex items-center gap-4 lg:hidden">
      <!-- Language Switcher Mobile -->
      <button 
        (click)="languageService.switchLanguage()"
        class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 font-bold"
      >
        {{ languageService.getCurrentLanguage().toUpperCase() }}
      </button>

      <!-- Theme Toggle Mobile -->
      <button 
        (click)="themeService.toggleTheme()"
        class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400"
      >
        @if (themeService.isDarkMode()) {
          <svg lucideMoon [size]="20"></svg>
        } @else {
          <svg lucideSun [size]="20"></svg>
        }
      </button>

      <button 
        (click)="isMenuOpen.set(!isMenuOpen())"
        class="p-2 text-slate-400 hover:text-blue-600 dark:hover:text-white transition-colors flex items-center justify-center"
      >
        @if (isMenuOpen()) {
          <svg lucideX [size]="28"></svg>
        } @else {
          <svg lucideMenu [size]="28"></svg>
        }
      </button>
    </div>
  </div>

  <!-- Mobile Menu Overlay - Fixed Full Screen -->
  <div [class]="'fixed top-0 left-0 w-full h-screen bg-white dark:bg-slate-950 z-[60] transition-transform duration-500 lg:hidden flex flex-col items-center justify-center gap-8 ' + (isMenuOpen() ? 'translate-x-0' : 'translate-x-full')">
    @for (link of navLinks; track link.labelKey) {
      <a (click)="scrollToSection(link.href)" 
         [class.active]="activeSection() === link.href.replace('#', '')"
         class="cursor-pointer text-2xl font-bold text-slate-900 dark:text-slate-400 hover:text-blue-600 dark:hover:text-white transition-colors">
        {{ link.labelKey | translate }}
      </a>
    }
    <a href="assets/data/BouabidAbdelfattah_CV.pdf" download="Bouabid_Abdelfattah_CV.pdf" class="px-10 py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-emerald-500 text-white font-bold text-lg">
      {{ 'navbar.downloadCV' | translate }}
    </a>
  </div>
</nav>
