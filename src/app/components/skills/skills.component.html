<section id="skills" appScrollReveal class="py-32 bg-white dark:bg-slate-950 transition-colors duration-500">
  <div class="container mx-auto px-6">
    <div class="max-w-4xl mb-20">
      <h2 class="text-sm font-black tracking-[0.3em] uppercase text-blue-600 dark:text-blue-500 mb-3">Expertise</h2>
      <h3 class="text-4xl md:text-5xl lg:text-6xl font-black text-slate-900 dark:text-white leading-tight tracking-tight">
        Compétences & <span class="text-slate-400 dark:text-slate-600 font-medium transition-colors">Technologies.</span>
      </h3>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (category of categories(); track category.title) {
        <div [class]="getCategoryClasses(category.color)">
          <div class="flex items-center gap-4 mb-8">
            <div [class]="getIconClasses(category.color)">
              <span class="flex items-center justify-center">
                <ng-container *ngComponentOutlet="category.icon; inputs: { size: 24 }"></ng-container>
              </span>
            </div>
            <h4 class="text-lg font-bold tracking-tight text-slate-900 dark:text-white">{{ category.title }}</h4>
          </div>

          <div class="flex flex-wrap gap-2">
            @for (skill of category.skills; track skill.name) {
              <span [class]="getBadgeClasses(category.color)">
                {{ skill.name }}
              </span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
